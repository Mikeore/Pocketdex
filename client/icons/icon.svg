<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="112" fill="#161b22"/>

  <!-- Subtle inner border glow -->
  <rect x="3" y="3" width="506" height="506" rx="110"
        fill="none" stroke="#58a6ff" stroke-width="3" opacity="0.25"/>

  <!-- Phone body -->
  <rect x="172" y="60" width="168" height="292" rx="22"
        fill="none" stroke="#58a6ff" stroke-width="12"/>

  <!-- Phone screen area -->
  <rect x="188" y="92" width="136" height="208" rx="6" fill="#0d1117"/>

  <!-- Home button pill -->
  <rect x="236" y="316" width="40" height="14" rx="7" fill="#30363d"/>

  <!-- Camera / sensor dot -->
  <circle cx="256" cy="76" r="5" fill="#30363d"/>

  <!-- Terminal prompt on screen: ">" chevron -->
  <polyline points="204,164 228,188 204,212"
            fill="none" stroke="#58a6ff"
            stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cursor line (blinking cursor representation) -->
  <line x1="238" y1="188" x2="296" y2="188"
        stroke="#3fb950" stroke-width="10" stroke-linecap="round"/>

  <!-- Second line hint (slightly faded) -->
  <line x1="204" y1="218" x2="272" y2="218"
        stroke="#8b949e" stroke-width="7" stroke-linecap="round" opacity="0.5"/>

  <!-- Connection dots (WiFi signal style) bottom area -->
  <circle cx="226" cy="430" r="10" fill="#58a6ff" opacity="0.35"/>
  <circle cx="256" cy="430" r="10" fill="#58a6ff" opacity="0.65"/>
  <circle cx="286" cy="430" r="10" fill="#58a6ff" opacity="1"/>
</svg>
