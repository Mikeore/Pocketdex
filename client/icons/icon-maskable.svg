<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable: full bleed background (safe zone is center 80%) -->
  <rect width="512" height="512" fill="#161b22"/>

  <!-- Phone body (scaled to fit safe zone ~409x409 centered) -->
  <rect x="188" y="82" width="136" height="240" rx="18"
        fill="none" stroke="#58a6ff" stroke-width="10"/>

  <!-- Screen -->
  <rect x="202" y="108" width="108" height="164" rx="5" fill="#0d1117"/>

  <!-- Home button -->
  <rect x="240" y="294" width="32" height="12" rx="6" fill="#30363d"/>

  <!-- Terminal > prompt -->
  <polyline points="216,162 234,180 216,198"
            fill="none" stroke="#58a6ff"
            stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cursor line -->
  <line x1="242" y1="180" x2="290" y2="180"
        stroke="#3fb950" stroke-width="9" stroke-linecap="round"/>

  <!-- Connection dots -->
  <circle cx="236" cy="400" r="9" fill="#58a6ff" opacity="0.4"/>
  <circle cx="256" cy="400" r="9" fill="#58a6ff" opacity="0.7"/>
  <circle cx="276" cy="400" r="9" fill="#58a6ff"/>
</svg>
