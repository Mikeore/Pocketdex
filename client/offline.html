<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>PocketDex – Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --blue: #58a6ff;
      --radius-lg: 14px;
      --radius-pill: 999px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 32px 24px;
      padding-top: calc(env(safe-area-inset-top) + 32px);
      padding-bottom: calc(env(safe-area-inset-bottom) + 32px);
      text-align: center;
    }

    .logo {
      width: 72px;
      height: 72px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.5;
      max-width: 280px;
    }

    button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      background: var(--blue);
      color: #0d1117;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-pill);
      cursor: pointer;
      touch-action: manipulation;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; transform: scale(0.97); }

    @media (prefers-reduced-motion: reduce) {
      button { transition: none; }
      button:active { transform: none; }
    }
  </style>
</head>
<body>
  <div class="logo">
    <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect width="40" height="40" rx="10" fill="#161b22"/>
      <path d="M20 8C13.373 8 8 13.373 8 20s5.373 12 12 12 12-5.373 12-12S26.627 8 20 8zm0 3a9 9 0 1 1 0 18A9 9 0 0 1 20 11zm0 3a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zm-4 8.5c0-1.5 1.8-2.5 4-2.5s4 1 4 2.5v.5H16v-.5z" fill="#58a6ff"/>
    </svg>
  </div>

  <div>
    <h1>You're offline</h1>
  </div>

  <p>PocketDex needs a network connection to talk to Codex. Check your Wi-Fi or mobile data and try again.</p>

  <button onclick="window.location.reload()">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
      <path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
      <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
    </svg>
    Try again
  </button>
</body>
</html>
